name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    name: JS bundle (Metro / Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install
        run: yarn install --frozen-lockfile

      # Comando padrão do React Native: gera o bundle JS do app.
      # Valida que TODO o JS resolve e compila (pega import quebrado / erro de sintaxe).
      # Roda no Linux sem Android SDK — é só o bundle de JavaScript, não o build nativo.
      - name: Metro bundle
        run: >-
          npx react-native bundle
          --platform android
          --dev false
          --entry-file index.js
          --bundle-output /tmp/app.android.bundle
          --reset-cache

  notificar:
    name: Notificar Telegram
    needs: [bundle]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      # Envia o status do CI pro Telegram (gratuito e oficial).
      # Segredos do repo: TELEGRAM_TO (teu chat_id) e TELEGRAM_BOT_TOKEN.
      - name: Enviar status para o Telegram
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          disable_web_page_preview: true
          message: |
            📱 GestãoHub-app — ${{ needs.bundle.result == 'success' && '✅ passou' || '❌ falhou' }}
            🌿 ${{ github.ref_name }} · 👤 ${{ github.actor }}
            📝 ${{ github.event.head_commit.message || github.event.pull_request.title }}
            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
