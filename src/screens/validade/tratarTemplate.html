<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @page { size: A4; margin: 15mm; }
      body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; margin: 0; padding: 0; }
      .container { width: 100%; max-width: 100%; margin: 0; background: #fff; padding: 15px; }
      .header-row { display: flex; align-items: center; justify-content: flex-start; border-bottom: 3px solid #294380; padding-bottom: 15px; margin-bottom: 20px; }
      .logo { width: 200px; height: 100px; object-fit: contain; display: block; margin-right: 40px; }
      .header-content { text-align: left; }
      .header-title { font-size: 2.2em; color: #294380; font-weight: bold; margin: 0; }
      .sub-title { font-size: 1.4em; color: #4666b2; margin-top: 6px; margin: 0; }
      .info-table { width: 100%; margin-top: 25px; font-size: 1.1em; }
      .info-table td { padding: 6px 12px; }
      .info-table .label { color: #294380; font-weight: bold; width: 150px; }
      .info-table .value { color: #222; }
      .products-table {
        width: 100%;
        border-collapse: collapse;
        margin: 25px auto 0 auto;
        font-size: 0.9em;
      }
      .products-table th, .products-table td {
        border: 1px solid #e0e0e0;
        padding: 10px 8px;
        text-align: center;
      }
      .products-table th {
        background: #294380;
        color: #fff;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .products-table tr:nth-child(even) { background: #f8f9fa; }
      
      /* Status Colors */
      .status-sold { color: #27ae60; font-weight: bold; }
      .status-exchanged { color: #1976D2; font-weight: bold; }
      .status-returned { color: #8e44ad; font-weight: bold; }
      .status-expired { color: #d32f2f; font-weight: bold; }
      
      .footer { margin-top: 40px; font-size: 0.9em; color: #777; border-top: 1px solid #eee; padding-top: 15px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header-row">
        {{LOGO_HTML}}
        <div class="header-content">
          <div class="header-title">Relatório de Tratativas</div>
          <div class="sub-title">Gestão de Saídas e Ocorrências</div>
        </div>
      </div>
      
      <table class="info-table">
        <tr>
          <td class="label">Data Emissão:</td><td class="value">{{DATA_EMISSAO}}</td>
          <td class="label">Total Registros:</td><td class="value">{{TOTAL_ITENS}}</td>
        </tr>
        <tr>
          <td class="label">Filtro:</td><td class="value">{{FILTRO_APLICADO}}</td>
          <td class="label">Usuário:</td><td class="value">{{USER_NAME}}</td>
        </tr>
      </table>

      <table class="products-table">
        <thead>
          <tr>
            <th width="5%">#</th>
            <th width="30%">Produto</th>
            <th width="10%">Cód.</th>
            <th width="10%">Lote</th>
            <th width="10%">Qtd</th>
            <th width="15%">Tipo</th>
            <th width="20%">Data/Hora</th>
          </tr>
        </thead>
        <tbody>
          {{PRODUTOS_HTML}}
        </tbody>
      </table>

      <div class="footer">
        Gerado automaticamente pelo aplicativo Gestão de Validades
      </div>
    </div>
  </body>
</html>
